<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Special for Nanaa ✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;700&family=Pacifico&family=Caveat:wght@700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #fff0f3;
            font-family: 'Quicksand', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
            overflow-x: hidden;
        }

        .container {
            width: 85%;
            max-width: 350px;
            background: white;
            padding: 40px 20px;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(255, 182, 193, 0.4);
            position: relative;
            z-index: 10;
        }

        h1 { font-family: 'Pacifico', cursive; color: #ff748c; margin-bottom: 10px; }
        .nickname { font-family: 'Caveat', cursive; font-size: 2.5em; color: #ff4d6d; margin-top: 0; }
        p { color: #594e50; font-size: 1em; line-height: 1.6; }

        .hidden { display: none; }

        .btn {
            background: linear-gradient(45deg, #ff748c, #ff4d6d);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1.1em;
            margin-top: 20px;
            box-shadow: 0 8px 20px rgba(255, 77, 109, 0.3);
            transition: 0.3s;
        }

        .btn:hover { transform: translateY(-3px); box-shadow: 0 12px 25px rgba(255, 77, 109, 0.5); }

        .decor { font-size: 50px; margin-bottom: 10px; display: block; }
        
        /* Animasi Bunga Jatuh Sederhana */
        .heart {
            position: absolute;
            color: #ffb3c1;
            font-size: 20px;
            user-select: none;
            z-index: 1;
            animation: fall linear forwards;
        }

        @keyframes fall {
            to { transform: translateY(100vh) rotate(360deg); }
        }
    </style>
</head>
<body>

    <div id="cover" class="container">
        <span class="decor">🌸</span>
        <p>Halo, ada pesan kecil buat...</p>
        <h2 class="nickname">Nanaa</h2>
        <button class="btn" onclick="openSurprise()">Buka Pesannya ✨</button>
    </div>

    <div id="main-content" class="container hidden">
        <span class="decor">🎂</span>
        <h1>Happy Birthday!</h1>
        <h2 class="nickname">Nanaa ✨</h2>
        
        <p>Selamat ulang tahun ya! Semoga di usia yang baru ini, Nanaa makin bahagia, sehat selalu, dan semua yang disemogakan segera terwujud.</p>
        
        <p style="font-size: 0.9em; color: #ff748c; font-weight: bold;">Keep shining, Nanaa! 💖</p>
        
        <p style="font-size: 0.8em; margin-top: 30px; color: #a39396;">- Dari Temanmu -</p>
    </div>

    <script>
        function openSurprise() {
            document.getElementById('cover').classList.add('hidden');
            document.getElementById('main-content').classList.remove('hidden');
            document.body.style.background = '#ffe5ec';
            
            // Jalankan hujan hati
            setInterval(createHeart, 300);
        }

        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = '🌸'; // Bisa diganti ❤️ atau ✨
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = Math.random() * 3 + 2 + 's';
            heart.style.opacity = Math.random();
            document.body.appendChild(heart);

            setTimeout(() => { heart.remove(); }, 5000);
        }
    </script>
</body>
</html>
